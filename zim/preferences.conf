include_hr=True
fontsize=0

[TagsPlugin]
pane=bottom_pane
autoexpand=True
autocollapse=True
use_hscroll=False
use_tooltip=True

[JournalPlugin]
pane=left_pane
hide_if_empty=False
namespace=Journal
granularity=Tag

[InsertScreenshotPlugin]
screenshot_command=import

[LineSorterPlugin]

[TableEditorPlugin]
