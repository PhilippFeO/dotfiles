[General]
plugins=["pageindex","insertsymbol","printtobrowser","tableofcontents","tags","sourceview","tasklist","journal","linesorter","attachmentbrowser"]
plugins_list_version=0.70

[PageIndexPlugin]
pane=left_pane
use_drag_and_drop=False
autoexpand=True
autocollapse=True
use_hscroll=False
use_tooltip=True

[PathBarPlugin]

[InsertSymbolPlugin]

[PrintToBrowserPlugin]

[VersionControlPlugin]
autosave=True
autosave_at_interval=False
