toolbar_style=None
toolbar_size=large

[PageView]
show_edit_bar=True
follow_on_enter=True
read_only_cursor=False
autolink_camelcase=False
autolink_files=True
autoselect=False
unindent_on_backspace=False
cycle_checkbox_type=True
recursive_indentlist=True
