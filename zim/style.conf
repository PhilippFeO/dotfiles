[TextView]
bullet_icon_size=GTK_ICON_SIZE_MENU
indent=30
tabs=None
linespacing=3
wrapped-lines-linespacing=0
font=Victor Mono Medium 14
justify=

[Tag strong]
foreground=#ffbbbb

[Tag emphasis]
foreground=#aaaaff

[Tag mark]
weight=PANGO_WEIGHT_BOLD

[Tag strike]
strikethrough=True
foreground=grey

[Tag code]
weight=PANGO_WEIGHT_BOLD
family=monospace
foreground=#ff59fd

[Tag pre]
foreground=#2e3436
family=monospace
wrap-mode=GTK_WRAP_NONE
indent=20

[Tag link]
foreground=aquamarine

[Tag tag]
foreground=#ce5c00

[Tag h1]
foreground=#5cac06
underline=PANGO_UNDERLINE_SINGLE
weight=PANGO_WEIGHT_BOLD
scale=1.75

[Tag h2]
foreground=#83f609
weight=PANGO_WEIGHT_BOLD
scale=1.52
indent=10

[Tag h3]
foreground=#a9f953
style=PANGO_STYLE_ITALIC
weight=PANGO_WEIGHT_BOLD
scale=1.32
indent=20

[Tag h4]
foreground=#cefb9d
weight=PANGO_WEIGHT_BOLD
scale=1.15
indent=30

[Tag h5]
foreground=#4e9a06
weight=PANGO_WEIGHT_BOLD

[Tag h6]
foreground=#4e9a06

[Tag checked-checkbox]

[Tag xchecked-checkbox]

[Tag migrated-checkbox]

